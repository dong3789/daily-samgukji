<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>출근길 삼국지</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #faf8f0;
    --text: #2c2c2c;
    --ui-bg: #eee;
    --ui-border: #ccc;
  }
  [data-theme="dark"] {
    --bg: #1a1a1a;
    --text: #d4d4d4;
    --ui-bg: #2a2a2a;
    --ui-border: #444;
  }
  [data-theme="sepia"] {
    --bg: #f4ecd8;
    --text: #5b4636;
    --ui-bg: #e8dcc8;
    --ui-border: #c8b898;
  }
  [data-theme="green"] {
    --bg: #e8f0e8;
    --text: #2c3e2c;
    --ui-bg: #d0e0d0;
    --ui-border: #a0b8a0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    transition: background 0.3s, color 0.3s;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
  }

  /* 설정 바 */
  .settings-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--ui-bg);
    border-bottom: 1px solid var(--ui-border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    transition: background 0.3s;
  }
  .settings-bar label {
    font-size: 13px;
    color: var(--text);
    opacity: 0.7;
  }
  .theme-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--ui-border);
    cursor: pointer;
    transition: transform 0.15s;
  }
  .theme-btn:hover { transform: scale(1.15); }
  .theme-btn.active { border-color: #4a90d9; box-shadow: 0 0 0 2px #4a90d9; }
  .theme-btn[data-t="light"] { background: #faf8f0; }
  .theme-btn[data-t="dark"] { background: #1a1a1a; }
  .theme-btn[data-t="sepia"] { background: #f4ecd8; }
  .theme-btn[data-t="green"] { background: #e8f0e8; }

  .font-btn {
    width: 32px; height: 28px;
    border: 1px solid var(--ui-border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .font-btn:active { opacity: 0.6; }
  .font-size-display {
    font-size: 13px;
    min-width: 32px;
    text-align: center;
    color: var(--text);
    opacity: 0.7;
  }

  .spacer { flex: 1; }

  /* 챕터 네비게이션 */
  .nav-btn {
    padding: 4px 12px;
    border: 1px solid var(--ui-border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
  }
  .nav-btn:hover { opacity: 0.7; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  /* 본문 */
  .reader {
    max-width: 680px;
    margin: 0 auto;
    padding: 32px 20px 80px;
    line-height: 1.9;
  }
  .reader h1 {
    font-size: 1.4em;
    margin-bottom: 8px;
    font-weight: 700;
  }
  .reader .subtitle {
    font-size: 0.85em;
    opacity: 0.5;
    margin-bottom: 32px;
  }
  .reader p {
    margin-bottom: 1.2em;
    text-align: justify;
    word-break: keep-all;
  }
  .reader .poem {
    font-style: italic;
    padding-left: 1.5em;
    border-left: 2px solid var(--ui-border);
    margin: 1.5em 0;
  }
  .reader .poem p {
    margin-bottom: 0.4em;
    text-align: left;
  }

  .chapter-nav-bottom {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 20px 60px;
    display: flex;
    justify-content: space-between;
  }

  .progress {
    font-size: 12px;
    opacity: 0.4;
    text-align: center;
    padding-bottom: 40px;
  }

  .read-progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    background: linear-gradient(90deg, #c0392b, #e67e22, #f1c40f);
    z-index: 200;
    width: 0%;
    transition: width 0.1s;
  }

  .read-percent {
    position: fixed;
    bottom: 16px;
    right: 16px;
    z-index: 200;
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    background: var(--ui-bg);
    border: 1px solid var(--ui-border);
    padding: 4px 10px;
    border-radius: 16px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .read-percent.visible { opacity: 0.7; }

  .loading {
    text-align: center;
    padding: 100px 20px;
    opacity: 0.5;
    font-size: 18px;
  }

  /* 메타데이터 섹션 */
  .meta-section {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 20px 32px;
  }
  .meta-toggle {
    width: 100%;
    padding: 14px 16px;
    background: var(--ui-bg);
    border: 1px solid var(--ui-border);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
    margin-bottom: 8px;
    transition: background 0.2s;
  }
  .meta-toggle:hover { opacity: 0.85; }
  .meta-toggle::after {
    content: '▸';
    float: right;
    transition: transform 0.2s;
  }
  .meta-toggle.open::after { transform: rotate(90deg); }
  .meta-content {
    display: none;
    padding: 16px;
    background: var(--ui-bg);
    border: 1px solid var(--ui-border);
    border-radius: 8px;
    margin-bottom: 16px;
  }
  .meta-content.open { display: block; }

  /* 지도 */
  .map-container {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: var(--bg);
    border-radius: 8px;
    overflow: hidden;
  }
  .map-container svg { width: 100%; height: 100%; }
  .map-dot {
    cursor: pointer;
    transition: r 0.15s;
  }
  .map-dot:hover { r: 6; }
  .map-label {
    font-size: 10px;
    fill: var(--text);
    pointer-events: none;
  }

  /* 인물 관계 */
  .char-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }
  .char-card {
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid var(--ui-border);
    background: var(--bg);
    font-size: 13px;
  }
  .char-card .char-name {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 4px;
  }
  .char-card .char-title {
    opacity: 0.65;
    font-size: 12px;
    line-height: 1.4;
  }
  .char-card .char-side {
    display: inline-block;
    margin-top: 6px;
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
  }
  .side-촉 { background: #2e7d32; }
  .side-위 { background: #1565c0; }
  .side-오 { background: #e65100; }
  .side-한 { background: #6a1b9a; }
  .side-황건적 { background: #f9a825; color: #333 !important; }
  .side-동탁, .side-여포, .side-원소 { background: #c62828; }
  .side-기타 { background: #757575; }

  .rel-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .rel-item {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--ui-border);
    font-size: 13px;
    background: var(--bg);
    white-space: nowrap;
  }
  .rel-item .rel-label {
    opacity: 0.6;
    font-size: 11px;
    margin: 0 4px;
  }

  /* 주요 장면 */
  .scene-list { display: flex; flex-direction: column; gap: 10px; }
  .scene-card {
    padding: 12px 16px;
    border-radius: 8px;
    border-left: 4px solid var(--ui-border);
    background: var(--bg);
  }
  .scene-card .scene-title {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 4px;
  }
  .scene-card .scene-desc {
    font-size: 13px;
    opacity: 0.75;
    line-height: 1.5;
  }
  .scene-card .scene-mood {
    display: inline-block;
    margin-top: 6px;
    font-size: 11px;
    opacity: 0.5;
  }
  .mood-전투 { border-left-color: #c62828; }
  .mood-긴장 { border-left-color: #e65100; }
  .mood-감동 { border-left-color: #2e7d32; }
  .mood-모략 { border-left-color: #6a1b9a; }
  .mood-비극 { border-left-color: #37474f; }
  .mood-희극 { border-left-color: #f9a825; }
  .mood-장엄 { border-left-color: #1565c0; }

  /* 챕터 목록 */
  .chapter-list-btn {
    padding: 4px 8px;
    border: 1px solid var(--ui-border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
  }
  .chapter-list-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.5);
  }
  .chapter-list-overlay.open { display: block; }
  .chapter-list-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-height: 60vh;
    overflow-y: auto;
    background: var(--bg);
    border-top: 1px solid var(--ui-border);
    padding: 16px;
    z-index: 201;
  }
  .chapter-list-panel a {
    display: block;
    padding: 10px 8px;
    color: var(--text);
    text-decoration: none;
    border-bottom: 1px solid var(--ui-border);
    font-size: 15px;
  }
  .chapter-list-panel a:hover { opacity: 0.7; }
  .chapter-list-panel a.current { font-weight: bold; color: #4a90d9; }
</style>
</head>
<body data-theme="light">

<div class="settings-bar">
  <label>배경</label>
  <button class="theme-btn active" data-t="light" onclick="setTheme('light')"></button>
  <button class="theme-btn" data-t="sepia" onclick="setTheme('sepia')"></button>
  <button class="theme-btn" data-t="green" onclick="setTheme('green')"></button>
  <button class="theme-btn" data-t="dark" onclick="setTheme('dark')"></button>

  <label style="margin-left:8px">글자</label>
  <button class="font-btn" onclick="changeFontSize(-1)">−</button>
  <span class="font-size-display" id="fontSizeDisplay">18</span>
  <button class="font-btn" onclick="changeFontSize(1)">+</button>

  <div class="spacer"></div>

  <button class="chapter-list-btn" onclick="goLatestChapter()">최신</button>
  <button class="chapter-list-btn" onclick="toggleChapterList()">목록</button>
  <button class="nav-btn" id="prevBtn" onclick="goChapter(-1)">← 이전</button>
  <button class="nav-btn" id="nextBtn" onclick="goChapter(1)">다음 →</button>
</div>

<div class="reader" id="reader">
  <div id="resumeCard" style="display:none; margin-bottom:20px; padding:14px 16px; background:var(--ui-bg); border:1px solid var(--ui-border); border-radius:10px;">
    <div style="font-size:14px; font-weight:600; margin-bottom:8px;">지난번 읽던 곳이 있어</div>
    <div id="resumeText" style="font-size:13px; opacity:0.7; margin-bottom:10px;"></div>
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <button class="nav-btn" onclick="resumeLastRead()">이어 읽기</button>
      <button class="nav-btn" onclick="dismissResumeCard()">닫기</button>
    </div>
  </div>
  <div class="loading">불러오는 중...</div>
</div>

<div id="metaSection" class="meta-section" style="display:none">
  <!-- 지도 -->
  <button class="meta-toggle" onclick="toggleMeta(this)">지도</button>
  <div class="meta-content" id="metaMap"></div>

  <!-- 등장인물 & 관계 -->
  <button class="meta-toggle" onclick="toggleMeta(this)">등장인물 & 관계</button>
  <div class="meta-content" id="metaChars"></div>

  <!-- 주요 장면 -->
  <button class="meta-toggle" onclick="toggleMeta(this)">주요 장면</button>
  <div class="meta-content" id="metaScenes"></div>
</div>

<div class="chapter-nav-bottom">
  <button class="nav-btn" id="prevBtn2" onclick="goChapter(-1)">← 이전 회</button>
  <button class="nav-btn" id="nextBtn2" onclick="goChapter(1)">다음 회 →</button>
</div>

<div class="progress" id="progress"></div>

<div class="read-progress-bar" id="readProgressBar"></div>
<div class="read-percent" id="readPercent"></div>

<div class="chapter-list-overlay" id="chapterListOverlay" onclick="toggleChapterList()">
  <div class="chapter-list-panel" id="chapterListPanel" onclick="event.stopPropagation()"></div>
</div>

<script>
// 읽기 진행률
let hidePercentTimer;
window.addEventListener('scroll', () => {
  const h = document.documentElement.scrollHeight - window.innerHeight;
  const pct = h > 0 ? Math.round(window.scrollY / h * 100) : 0;
  document.getElementById('readProgressBar').style.width = pct + '%';
  const el = document.getElementById('readPercent');
  el.textContent = pct + '%';
  el.classList.add('visible');
  clearTimeout(hidePercentTimer);
  hidePercentTimer = setTimeout(() => el.classList.remove('visible'), 1500);
});

const TOTAL_CHAPTERS = 120;
let currentChapter = 1;
let fontSize = 18;
let theme = 'light';
let lastReadChapter = null;
let publishedChapters = [];

// 설정 로드
function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('samgukji-settings') || '{}');
    if (s.fontSize) fontSize = s.fontSize;
    if (s.theme) theme = s.theme;
    if (s.lastReadChapter) lastReadChapter = s.lastReadChapter;
  } catch(e) {}
}

function saveSettings() {
  localStorage.setItem('samgukji-settings', JSON.stringify({ fontSize, theme, lastReadChapter }));
}

function setTheme(t) {
  theme = t;
  document.body.setAttribute('data-theme', t);
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.t === t));
  saveSettings();
}

function changeFontSize(delta) {
  fontSize = Math.max(14, Math.min(28, fontSize + delta));
  document.getElementById('reader').style.fontSize = fontSize + 'px';
  document.getElementById('fontSizeDisplay').textContent = fontSize;
  saveSettings();
}

function getChapterFromHash() {
  const hash = location.hash.replace('#', '');
  const num = parseInt(hash);
  return (num >= 1 && num <= TOTAL_CHAPTERS) ? num : 1;
}

function saveLastReadChapter(num) {
  lastReadChapter = num;
  saveSettings();
}

function showResumeCard() {
  const card = document.getElementById('resumeCard');
  const text = document.getElementById('resumeText');
  if (!lastReadChapter || lastReadChapter <= 1 || lastReadChapter === currentChapter) {
    card.style.display = 'none';
    return;
  }
  text.textContent = `마지막으로 ${lastReadChapter}회까지 읽었어`;
  card.style.display = 'block';
}

function dismissResumeCard() {
  document.getElementById('resumeCard').style.display = 'none';
}

function resumeLastRead() {
  if (lastReadChapter) {
    loadChapter(lastReadChapter);
  }
}

function goLatestChapter() {
  const latest = publishedChapters.length ? publishedChapters[publishedChapters.length - 1].num : currentChapter;
  loadChapter(latest);
}

async function loadChapter(num) {
  currentChapter = num;
  location.hash = '#' + num;
  const resumeCard = document.getElementById('resumeCard');
  document.getElementById('reader').innerHTML = '';
  if (resumeCard) document.getElementById('reader').appendChild(resumeCard);
  document.getElementById('reader').insertAdjacentHTML('beforeend', '<div class="loading">불러오는 중...</div>');
  window.scrollTo(0, 0);

  try {
    const resp = await fetch(`chapters/${String(num).padStart(3, '0')}.json`);
    if (!resp.ok) throw new Error('Chapter not found');
    const data = await resp.json();
    renderChapter(data);
    saveLastReadChapter(num);
  } catch(e) {
    document.getElementById('reader').innerHTML =
      `<div class="loading">아직 번역되지 않은 회입니다. (${num}회)</div>`;
  }

  // 네비 버튼
  document.getElementById('prevBtn').disabled = num <= 1;
  document.getElementById('nextBtn').disabled = num >= TOTAL_CHAPTERS;
  document.getElementById('prevBtn2').disabled = num <= 1;
  document.getElementById('nextBtn2').disabled = num >= TOTAL_CHAPTERS;
  const latestPublishedNum = publishedChapters.length ? publishedChapters[publishedChapters.length - 1].num : 0;
  document.getElementById('progress').textContent = `현재 ${num}회 · 발행 ${latestPublishedNum}/${TOTAL_CHAPTERS}회`;
  showResumeCard();
}

function renderChapter(data) {
  const reader = document.getElementById('reader');
  const koreanTitle = data.korean_title || data.title;
  let html = `<h1>${koreanTitle}</h1>`;
  if (data.original_title) {
    html += `<div class="subtitle">${data.original_title}</div>`;
  }
  html += data.content;
  reader.innerHTML = html;
  renderMeta(data.meta);
}

function toggleMeta(btn) {
  btn.classList.toggle('open');
  const content = btn.nextElementSibling;
  content.classList.toggle('open');
}

function renderMeta(meta) {
  const section = document.getElementById('metaSection');
  if (!meta || (!meta.characters?.length && !meta.scenes?.length && !meta.locations?.length)) {
    section.style.display = 'none';
    return;
  }
  section.style.display = 'block';

  // 지도
  const mapEl = document.getElementById('metaMap');
  if (meta.location_coords && Object.keys(meta.location_coords).length > 0) {
    mapEl.previousElementSibling.style.display = '';
    mapEl.innerHTML = renderMap(meta.location_coords);
  } else {
    mapEl.previousElementSibling.style.display = 'none';
    mapEl.innerHTML = '';
  }

  // 인물 & 관계
  const charsEl = document.getElementById('metaChars');
  let charsHtml = '';
  if (meta.characters?.length) {
    charsHtml += '<div class="char-grid">';
    meta.characters.forEach(c => {
      const sideClass = c.side ? `side-${c.side}` : 'side-기타';
      charsHtml += `<div class="char-card">
        <div class="char-name">${c.name}</div>
        <div class="char-title">${c.title || ''}</div>
        ${c.side ? `<span class="char-side ${sideClass}">${c.side}</span>` : ''}
      </div>`;
    });
    charsHtml += '</div>';
  }
  if (meta.relationships?.length) {
    charsHtml += '<div class="rel-list">';
    meta.relationships.forEach(r => {
      charsHtml += `<div class="rel-item">${r.from}<span class="rel-label">${r.label}</span>${r.to}</div>`;
    });
    charsHtml += '</div>';
  }
  charsEl.innerHTML = charsHtml;

  // 주요 장면
  const scenesEl = document.getElementById('metaScenes');
  if (meta.scenes?.length) {
    const moodEmoji = {전투:'⚔️',긴장:'😰',감동:'🥹',모략:'🧠',비극:'😢',희극:'😄',장엄:'👑'};
    let sHtml = '<div class="scene-list">';
    meta.scenes.forEach(s => {
      const moodCls = s.mood ? `mood-${s.mood}` : '';
      const emoji = moodEmoji[s.mood] || '📖';
      sHtml += `<div class="scene-card ${moodCls}">
        <div class="scene-title">${emoji} ${s.title}</div>
        <div class="scene-desc">${s.description}</div>
        <span class="scene-mood">${s.mood || ''}</span>
      </div>`;
    });
    sHtml += '</div>';
    scenesEl.innerHTML = sHtml;
  } else {
    scenesEl.innerHTML = '';
  }

  // 모든 토글 닫기
  section.querySelectorAll('.meta-toggle').forEach(b => b.classList.remove('open'));
  section.querySelectorAll('.meta-content').forEach(c => c.classList.remove('open'));
}

function renderMap(coords) {
  // 간소화된 삼국지 지도 SVG
  const entries = Object.entries(coords);
  let dots = '';
  entries.forEach(([name, [x, y]]) => {
    dots += `<circle class="map-dot" cx="${x}%" cy="${y}%" r="4" fill="#c62828" opacity="0.85"/>`;
    dots += `<text class="map-label" x="${x}%" y="${Number(y) - 2.5}%" text-anchor="middle">${name}</text>`;
  });

  return `<div class="map-container">
    <svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
      <!-- 배경 -->
      <rect width="100" height="80" fill="none"/>
      <!-- 간소화된 중국 영역 -->
      <path d="M15,15 Q25,8 45,10 Q60,8 75,15 Q82,22 80,35 Q78,45 75,50 Q70,58 65,62 Q55,70 45,72 Q35,70 28,65 Q20,58 18,48 Q15,38 15,28 Z"
            fill="var(--ui-bg)" stroke="var(--ui-border)" stroke-width="0.5" opacity="0.6"/>
      <!-- 장강 -->
      <path d="M20,50 Q30,48 38,50 Q48,52 55,48 Q62,45 72,52"
            fill="none" stroke="#4a90d9" stroke-width="0.6" opacity="0.4"/>
      <text x="60" y="54" font-size="3" fill="#4a90d9" opacity="0.4">장강</text>
      <!-- 황하 -->
      <path d="M22,30 Q30,25 40,32 Q48,35 55,30 Q62,27 68,32"
            fill="none" stroke="#d4a017" stroke-width="0.6" opacity="0.4"/>
      <text x="60" y="28" font-size="3" fill="#d4a017" opacity="0.4">황하</text>
      <!-- 위치 마커 -->
      ${dots}
    </svg>
  </div>`;
}

function goChapter(delta) {
  const next = currentChapter + delta;
  if (next >= 1 && next <= TOTAL_CHAPTERS) {
    loadChapter(next);
  }
}

function toggleChapterList() {
  const overlay = document.getElementById('chapterListOverlay');
  overlay.classList.toggle('open');
  if (overlay.classList.contains('open')) {
    buildChapterList();
  }
}

async function buildChapterList() {
  const panel = document.getElementById('chapterListPanel');
  let html = '';
  try {
    const resp = await fetch('index.json');
    const chapters = await resp.json();
    publishedChapters = chapters;
    const latestPublishedNum = chapters.length ? chapters[chapters.length - 1].num : 0;

    html += `<div style="padding:8px 8px 14px; font-size:12px; opacity:0.6;">`;
    html += `발행됨 ${latestPublishedNum}회 / 전체 ${TOTAL_CHAPTERS}회`;
    if (lastReadChapter) {
      html += ` · 마지막 읽음 ${lastReadChapter}회`;
    }
    html += `</div>`;

    chapters.forEach(ch => {
      const cls = ch.num === currentChapter ? 'current' : '';
      const isRead = lastReadChapter && ch.num <= lastReadChapter;
      const title = ch.korean_title || `제${ch.num}회`;
      const statusText = isRead ? '읽음' : (ch.num === lastReadChapter + 1 ? '다음' : '안읽음');
      const statusColor = isRead ? '#2e7d32' : (ch.num === lastReadChapter + 1 ? '#c77800' : '#999');
      html += `<a href="#${ch.num}" class="${cls}" onclick="loadChapter(${ch.num});toggleChapterList()" style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
        <span style="min-width:0; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${title}</span>
        <span style="font-size:11px; color:${statusColor}; white-space:nowrap;">${statusText}</span>
      </a>`;
    });
  } catch(e) {
    html = '<p style="padding:20px;opacity:0.5">목록을 불러올 수 없습니다.</p>';
  }
  panel.innerHTML = html;
}

async function preloadChapterIndex() {
  try {
    const resp = await fetch('index.json');
    const chapters = await resp.json();
    publishedChapters = chapters.map(ch => ({
      ...ch,
      korean_title: ch.korean_title || `제${ch.num}회`
    }));
  } catch(e) {
    publishedChapters = [];
  }
}

// 키보드 네비게이션
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') goChapter(-1);
  if (e.key === 'ArrowRight') goChapter(1);
});

// 초기화
loadSettings();
setTheme(theme);
changeFontSize(0);
preloadChapterIndex();
currentChapter = getChapterFromHash();
loadChapter(currentChapter);

window.addEventListener('hashchange', () => {
  const num = getChapterFromHash();
  if (num !== currentChapter) loadChapter(num);
});
</script>
